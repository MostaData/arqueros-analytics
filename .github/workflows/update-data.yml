name: Actualizar Datos de Arqueros

on:
  schedule:
    # Corre automáticamente todos los días a las 6am UTC (3am Argentina)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Permite ejecutarlo manualmente desde el botón en GitHub
    inputs:
      force_full_rescrape:
        description: 'Forzar re-scrape completo (true/false)'
        required: false
        default: 'false'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Instalar dependencias
        run: npm install
        working-directory: scripts

      - name: Ejecutar scraper
        run: node scrape.js
        working-directory: scripts
        env:
          FORCE_FULL_RESCRAPE: ${{ github.event.inputs.force_full_rescrape || 'false' }}

      - name: Construir archivos JSON
        run: node build-data.js
        working-directory: scripts

      - name: Verificar si hubo cambios
        id: check_changes
        run: |
          git diff --quiet data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Publicar cambios si hubo actualizaciones
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: actualización automática $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push

      - name: Sin cambios
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "Los datos ya están actualizados. No se realizaron cambios."
