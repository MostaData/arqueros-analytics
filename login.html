<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arqueros Analytics — Acceso</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #1a1d27;
      border: 1px solid #2a2f45;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo h1 { font-size: 1.8rem; margin-bottom: 4px; }
    .login-logo p  { font-size: 0.82rem; color: #8892a4; }
    label {
      display: block;
      font-size: 0.75rem;
      color: #8892a4;
      margin-bottom: 5px;
      margin-top: 16px;
    }
    input {
      width: 100%;
      background: #232838;
      border: 1px solid #2a2f45;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #4f8ef7; }
    .btn-login {
      margin-top: 24px;
      width: 100%;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover:not(:disabled) { background: #3a7ae0; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .spinner-sm {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg {
      margin-top: 14px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.35);
      color: #f87171;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      text-align: center;
      display: none;
    }
    .error-msg.visible { display: block; }
    .login-contact {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #2a2f45;
      text-align: center;
    }
    .login-contact p {
      font-size: 0.78rem;
      color: #8892a4;
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .login-contact a {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.15s;
    }
    .login-contact a:hover { opacity: 0.88; transform: translateY(-1px); }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <h1>🎯 Arqueros</h1>
    <p>Panel de Análisis · Acceso restringido</p>
  </div>

  <form id="login-form" onsubmit="handleLogin(event)">
    <label for="username">Usuario</label>
    <input type="text" id="username" placeholder="nombre_usuario" autocomplete="username" required spellcheck="false">

    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password" required>

    <button type="submit" class="btn-login" id="btn-submit">Ingresar</button>
    <div class="error-msg" id="error-msg">Correo o contraseña incorrectos</div>
  </form>

  <div class="login-contact">
    <p>¿Querés tu usuario permanente?<br>Contactate con:</p>
    <a href="https://www.instagram.com/mostadata?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw=="
       target="_blank" rel="noopener">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
      </svg>
      @mostadata
    </a>
  </div>
</div>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/auth.js"></script>
<script>
  // ── Dev bypass
  if (location.protocol === 'file:') { location.replace('index.html'); }

  // ── Ya autenticado → ir directo al dashboard
  if (authCacheGet()) location.replace('index.html');

  async function handleLogin(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const pass     = document.getElementById('password').value;
    const err      = document.getElementById('error-msg');
    const btn      = document.getElementById('btn-submit');

    err.classList.remove('visible');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner-sm"></div> Ingresando…';

    const { user, error } = await authSignIn(username, pass);

    if (error) {
      err.textContent = error;
      err.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Ingresar';
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    } else {
      location.replace('index.html');
    }
  }
</script>

</body>
</html>
